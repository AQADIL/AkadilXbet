version: "3.9"

networks:
  akadilxbet_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

secrets:
  postgres_user:
    file: ../secrets/postgres_user.txt
  postgres_password:
    file: ../secrets/postgres_password.txt
  redis_password:
    file: ../secrets/redis_password.txt
  jwt_secret:
    file: ../secrets/jwt_secret.txt

services:

  postgres:
    image: postgres:16-alpine
    container_name: akadilxbet_postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - akadilxbet_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/postgres_user) -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akadilxbet_redis
    ports:
      - "${REDIS_PORT}:6379"
    command: >
      sh -c 'redis-server --requirepass "$$(cat /run/secrets/redis_password)"'
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - akadilxbet_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/redis_password) ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: akadilxbet_nats
    ports:
      - "${NATS_PORT}:4222"
      - "${NATS_MONITOR_PORT}:8222"
    command: ["--jetstream", "--http_port", "8222"]
    networks:
      - akadilxbet_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: akadilxbet_mailpit
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"
    networks:
      - akadilxbet_net
    restart: unless-stopped

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: akadilxbet_auth
    environment:
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NATS_URL: nats://nats:4222
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
    secrets:
      - postgres_user
      - postgres_password
      - redis_password
      - jwt_secret
    ports:
      - "${AUTH_SERVICE_GRPC_PORT}:${AUTH_SERVICE_GRPC_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  wallet-service:
    build:
      context: ../services/wallet-service
      dockerfile: Dockerfile
    container_name: akadilxbet_wallet
    environment:
      WALLET_SERVICE_GRPC_PORT: ${WALLET_SERVICE_GRPC_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: nats://nats:4222
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_user
      - postgres_password
    ports:
      - "${WALLET_SERVICE_GRPC_PORT}:${WALLET_SERVICE_GRPC_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: akadilxbet_gateway
    environment:
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
      AUTH_SERVICE_ADDR: auth-service:${AUTH_SERVICE_GRPC_PORT}
      WALLET_SERVICE_ADDR: wallet-service:${WALLET_SERVICE_GRPC_PORT}
      NATS_URL: nats://nats:4222
      JWT_SECRET_FILE: /run/secrets/jwt_secret
    secrets:
      - jwt_secret
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      - auth-service
      - wallet-service
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV}
    container_name: akadilxbet_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - akadilxbet_net
    depends_on:
      - api-gateway
    restart: unless-stopped
