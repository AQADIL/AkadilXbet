networks:
  akadilxbet_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: akadilxbet_postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=trust"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - akadilxbet_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akadilxbet_redis
    ports:
      - "${REDIS_PORT}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - akadilxbet_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: akadilxbet_nats
    ports:
      - "${NATS_PORT}:4222"
      - "${NATS_MONITOR_PORT}:8222"
    command: ["--jetstream", "--http_port", "8222"]
    networks:
      - akadilxbet_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: akadilxbet_mailpit
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"
    networks:
      - akadilxbet_net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    platform: linux/amd64
    container_name: akadilxbet_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - akadilxbet_net
    restart: unless-stopped

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: akadilxbet_auth
    environment:
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT}
      AUTH_SERVICE_HTTP_PORT: ${AUTH_SERVICE_HTTP_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
    ports:
      - "${AUTH_SERVICE_GRPC_PORT}:${AUTH_SERVICE_GRPC_PORT}"
      - "${AUTH_SERVICE_HTTP_PORT}:${AUTH_SERVICE_HTTP_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  wallet-service:
    build:
      context: ..
      dockerfile: services/wallet-service/Dockerfile
    container_name: akadilxbet_wallet
    environment:
      WALLET_SERVICE_GRPC_PORT: ${WALLET_SERVICE_GRPC_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NATS_URL: nats://nats:4222
    ports:
      - "${WALLET_SERVICE_GRPC_PORT}:${WALLET_SERVICE_GRPC_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  aviator-service:
    build:
      context: ..
      dockerfile: services/aviator-service/Dockerfile
    container_name: akadilxbet_aviator
    platform: linux/amd64
    environment:
      AVIATOR_SERVICE_GRPC_PORT: ${AVIATOR_SERVICE_GRPC_PORT}
      AVIATOR_SERVICE_HTTP_PORT: ${AVIATOR_SERVICE_HTTP_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222
    ports:
      - "${AVIATOR_SERVICE_GRPC_PORT}:${AVIATOR_SERVICE_GRPC_PORT}"
      - "${AVIATOR_SERVICE_HTTP_PORT}:${AVIATOR_SERVICE_HTTP_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  balloon-service:
    build:
      context: ..
      dockerfile: services/balloon-service/Dockerfile
    container_name: akadilxbet_balloon
    platform: linux/amd64
    environment:
      BALLOON_SERVICE_GRPC_PORT: ${BALLOON_SERVICE_GRPC_PORT}
      BALLOON_SERVICE_HTTP_PORT: ${BALLOON_SERVICE_HTTP_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222
    ports:
      - "${BALLOON_SERVICE_GRPC_PORT}:${BALLOON_SERVICE_GRPC_PORT}"
      - "${BALLOON_SERVICE_HTTP_PORT}:${BALLOON_SERVICE_HTTP_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  scratch-service:
    build:
      context: ../services/scratch-service
      dockerfile: Dockerfile
    container_name: akadilxbet_scratch
    environment:
      SCRATCH_SERVICE_PORT: ${SCRATCH_SERVICE_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${SCRATCH_SERVICE_PORT}:${SCRATCH_SERVICE_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  slots-service:
    build:
      context: ../services/slots-service
      dockerfile: Dockerfile
    container_name: akadilxbet_slots
    environment:
      SLOTS_SERVICE_PORT: ${SLOTS_SERVICE_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${SLOTS_SERVICE_PORT}:${SLOTS_SERVICE_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: akadilxbet_gateway
    environment:
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
      AUTH_SERVICE_ADDR: auth-service:${AUTH_SERVICE_GRPC_PORT}
      AUTH_SERVICE_HTTP_PORT: ${AUTH_SERVICE_HTTP_PORT}
      AUTH_SERVICE_HOST: auth-service
      WALLET_SERVICE_ADDR: wallet-service:${WALLET_SERVICE_GRPC_PORT}
      AVIATOR_SERVICE_HTTP_URL: http://aviator-service:${AVIATOR_SERVICE_HTTP_PORT}
      BALLOON_SERVICE_HTTP_URL: http://balloon-service:${BALLOON_SERVICE_HTTP_PORT}
      SCRATCH_SERVICE_HOST: scratch-service
      SCRATCH_SERVICE_PORT: ${SCRATCH_SERVICE_PORT}
      SLOTS_SERVICE_HOST: slots-service
      SLOTS_SERVICE_PORT: ${SLOTS_SERVICE_PORT}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    networks:
      - akadilxbet_net
    depends_on:
      - auth-service
      - wallet-service
      - aviator-service
      - balloon-service
      - scratch-service
      - slots-service
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV}
        API_BASE_URL: http://api-gateway:${API_GATEWAY_PORT}
    container_name: akadilxbet_frontend
    environment:
      API_BASE_URL: http://api-gateway:${API_GATEWAY_PORT}
    ports:
      - "${FRONTEND_PORT}:3000"
    networks:
      - akadilxbet_net
    depends_on:
      - api-gateway
    restart: unless-stopped

